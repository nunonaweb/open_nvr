# ---------------------------------------------------------
# Câmera IP .13
# ---------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cam-recorder-13
  namespace: nvr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recorder
      camera: "13"
  template:
    metadata:
      labels:
        app: recorder
        camera: "13"
    spec:
      hostNetwork: true
      terminationGracePeriodSeconds: 40
      containers:
      - name: ffmpeg
        image: camera-recorder:v1
        resources:
          limits:
            cpu: "800m"
            memory: "2Gi"
          requests:
            cpu: "300m"
            memory: "512Mi"
        env:
        - name: CAMERA_IP
          value: "192.168.1.13"
        - name: TZ
          value: "America/Sao_Paulo"
        startupProbe:
          exec:
            command: ["pgrep", "ffmpeg"]
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 10
        livenessProbe:
          exec:
            command: ["pgrep", "ffmpeg"]
          periodSeconds: 30
        volumeMounts:
        - name: storage
          mountPath: /1tb/video
        - name: timezone
          mountPath: /etc/localtime
          readOnly: true
      volumes:
      - name: storage
        hostPath:
          path: /1tb/video
          type: DirectoryOrCreate
      - name: timezone
        hostPath:
          path: /usr/share/zoneinfo/America/Sao_Paulo
---
