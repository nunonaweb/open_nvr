kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 45543
nodes:
- role: control-plane
  # ESTA É A CHAVE: Mapeia o HD real para dentro do nó do KIND
  extraMounts:
  - hostPath: /1tb/video
    containerPath: /1tb/video
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
