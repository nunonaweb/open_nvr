apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvr-viewer
  namespace: nvr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvr-viewer
  template:
    metadata:
      labels:
        app: nvr-viewer
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        # Este comando configura o Nginx para listar arquivos (autoindex)
        command: ["/bin/sh", "-c"]
        args:
          - |
            printf "server { 
                listen 80; 
                location / { 
                    root /usr/share/nginx/html; 
                    autoindex on; 
                    autoindex_exact_size off; 
                    autoindex_localtime on; 
                } 
            }" > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
        volumeMounts:
        - name: video-storage
          mountPath: /usr/share/nginx/html
          readOnly: true
      volumes:
      - name: video-storage
        hostPath:
          path: /1tb/video
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: nvr-viewer-service
  namespace: nvr
spec:
  type: NodePort
  selector:
    app: nvr-viewer
  ports:
    - port: 80          # Porta interna do container
      targetPort: 80    # Porta que o Nginx ouve
      nodePort: 80   # Porta que você vai usar no browser
