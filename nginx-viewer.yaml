apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvr-viewer
  namespace: nvr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvr-viewer
  template:
    metadata:
      labels:
        app: nvr-viewer
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        env:
        - name: TZ
          value: "America/Sao_Paulo"
        ports:
        - containerPort: 80
        command: ["/bin/sh", "-c"]
        args:
          - |
            printf "server { 
                listen 80; 
                location / { 
                    root /usr/share/nginx/html; 
                    autoindex on; 
                    autoindex_exact_size off; 
                    autoindex_localtime on; 
                } 
            }" > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
        volumeMounts:
        - name: video-storage
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: timezone
          mountPath: /etc/localtime
          readOnly: true
      volumes:
      - name: video-storage
        hostPath:
          path: /1tb/video
          type: Directory
      - name: timezone
        hostPath:
          path: /usr/share/zoneinfo/America/Sao_Paulo
---
apiVersion: v1
kind: Service
metadata:
  name: nvr-viewer-service
  namespace: nvr
spec:
  type: NodePort
  selector:
    app: nvr-viewer
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080  # Alterado de 80 para 30080 (faixa permitida pelo K8s)
